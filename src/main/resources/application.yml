# Application JWT Configuration
app:
  jwt:
    # Signing key for JWT tokens; must be at least 32 characters for HS256 algorithm
    secret: ${JWT_SECRET:your-super-secret-key-change-in-production-at-least-32-characters-long-for-hs256}
    # Token validity duration in milliseconds
    expiration: ${JWT_EXPIRATION:3600000}

  database:
    # Rebuilds the schema from scratch on every startup: Flyway drops all objects (clean) and
    # then reapplies every migration in db/migration, so local runs never drift from what's
    # checked in and stale dev data can't mask a broken migration.
    #
    # To keep data between restarts (e.g. you're seeding fixtures manually, or iterating on a
    # new migration without losing everything each time), set this to false — Flyway will then
    # only apply migrations that haven't run yet and leave existing rows untouched. Override with
    # the DB_RESET_ON_STARTUP environment variable rather than editing this file.
    #
    # This must stay true only for local/dev use. spring.flyway.clean-disabled below is the actual
    # safety net against wiping a real database - if you point this config at anything other than
    # a disposable local Postgres, set clean-disabled back to true first.
    reset-on-startup: ${DB_RESET_ON_STARTUP:true}

spring:
  # Application name used for identification and service discovery
  application:
    name: payment-core

  # PostgreSQL database connection configuration
  datasource:
    # Connection URL for the PostgreSQL database
    url: jdbc:postgresql://localhost:5432/payment_db
    # Database user credentials
    username: postgres
    password: postgres
    # JDBC driver for PostgreSQL
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20 # Max connections (increase from default 10)
      minimum-idle: 5 # Min idle connections
      idle-timeout: 600000 # 10 minutes
      connection-timeout: 20000 # 20 seconds
      max-lifetime: 1800000 # 30 minutes
      auto-commit: true
      data-source-properties:
        cachePreparedStatements: true
        preparedStatementCacheSize: 250
        preparedStatementCacheSqlLimit: 2048

  # Flyway schema migrations - source of truth for the database schema, replacing
  # Hibernate's auto-DDL. Scripts live in src/main/resources/db/migration.
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Lets Flyway adopt a database that already has objects in it (e.g. one created by an
    # older ddl-auto run) instead of failing because the schema history table is missing.
    baseline-on-migrate: true
    # Spring Boot disables Flyway's clean command by default as a safety guard. It has to be
    # re-enabled here for app.database.reset-on-startup (see above) to actually be able to
    # wipe the schema; flip this back to true if this config ever points at a database that
    # isn't a disposable local instance.
    clean-disabled: false

  # JPA and Hibernate configuration
  jpa:
    hibernate:
      # Schema is owned by Flyway migrations now; Hibernate only checks that entity mappings
      # match what Flyway created and fails fast on drift instead of silently altering tables.
      ddl-auto: validate
    # Disable SQL logging to reduce noise in development
    show-sql: false
    properties:
      hibernate:
        # Use PostgreSQL dialect for optimal SQL generation
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Format SQL output for better readability in logs
        "[format_sql]": true
        jdbc:
          # Batch multiple inserts to reduce database round-trips
          "[batch_size]": 20
        # Preserve the order of inserts to prevent foreign key constraint violations
        "[order_inserts]": true
        # Preserve the order of updates to maintain data consistency
        "[order_updates]": true

  # Security configuration for Spring Security filters
  security:
    filter:
      # Set JWT filter priority before other security filters
      order: 5

# Server configuration
server:
  # HTTP port for the application
  port: 8080
  servlet:
    # Root context path for all endpoints
    context-path: /

# Actuator and monitoring configuration
management:
  endpoints:
    web:
      # Base path for all actuator endpoints
      base-path: /actuator
      exposure:
        # Expose only essential endpoints for health checks and metrics
        include: health,metrics,prometheus,info
  endpoint:
    health:
      # Show detailed health information only to authorized users
      show-details: when-authorized
      probes:
        # Enable Kubernetes-style liveness and readiness probes
        enabled: true
  health:
    # Enable liveness probe to indicate if application is running
    livenessstate:
      enabled: true
    # Enable readiness probe to indicate if application can handle requests
    readinessstate:
      enabled: true
  tracing:
    sampling:
      # Capture 100% of traces for development; reduce in production
      probability: 1.0
  # Send traces to Jaeger via Zipkin protocol
  zipkin:
    tracing:
      # Jaeger collector endpoint for receiving traces
      endpoint: http://localhost:9411/api/v2/spans

# OpenAPI and Swagger UI configuration
springdoc:
  api-docs:
    # OpenAPI specification endpoint
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    # Swagger UI interface endpoint
    path: /swagger-ui.html
    enabled: true
    # Sort API operations by HTTP method
    operations-sorter: method
    # Sort API tags alphabetically
    tags-sorter: alpha
    # Access Swagger UI from root path
    use-root-path: true
    # Primary API name in Swagger UI
    urls-primary-name: payment-core
    # Hide operation IDs from UI for cleaner display
    display-operation-id: false
    # Enable deep linking to specific operations
    deep-linking: true
    # Hide vendor extensions from UI
    show-extensions: false
    # Enable try-it-out feature for testing endpoints
    try-it-out-enabled: true
    # Disable request filtering in UI
    filter: false
    # Use standalone layout for Swagger UI
    layout: StandaloneLayout
  # Hide actuator endpoints from API documentation
  show-actuator: false
  # Use fully qualified names for model classes in documentation
  use-fqn: true

# Resilience4j fault tolerance patterns
resilience4j:
  circuitbreaker:
    configs:
      default:
        # Open circuit if failure rate exceeds 50% of calls
        failureRateThreshold: 50
        # Open circuit if slow calls exceed 50% of total calls
        slowCallRateThreshold: 50
        # Requests taking longer than 2s are considered slow
        slowCallDurationThreshold: 2s
        # Wait 30 seconds before attempting recovery
        waitDurationInOpenState: 30s
        # Allow 3 test calls in half-open state before deciding to close or re-open
        permittedNumberOfCallsInHalfOpenState: 3
        # Automatically transition from open to half-open without manual intervention
        automaticTransitionFromOpenToHalfOpenEnabled: true

  # Automatic retry configuration for transient failures
  retry:
    configs:
      default:
        # Retry failed calls up to 3 times
        maxAttempts: 3
        # Wait 100ms before retrying
        waitDuration: 100ms

  # Call timeout protection
  timelimiter:
    configs:
      default:
        # Force timeout after 5 seconds to prevent hanging requests
        timeoutDuration: 5s

  # Rate limiting configuration
  ratelimiter:
    configs:
      default:
        # Reset rate limit quota every 1 hour
        limit-refresh-period: 1h
        # Allow maximum 100 calls per hour per instance
        limit-for-period: 100
        # Wait up to 1 second for available rate limit slots
        timeout-duration: 1s

# Logging configuration
logging:
  level:
    # Default log level for all packages
    root: INFO
    # Verbose logging for payment module for debugging
    "[com.payment]": DEBUG
  pattern:
    # Log format with timestamp and message
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    # File path for persisting logs
    name: logs/payment-core.log
