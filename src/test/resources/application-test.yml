spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Migrations under db/migration are Postgres-only (BIGSERIAL, INET, JSONB); skip them here
  # and let Hibernate generate the schema straight from the entities against H2 instead.
  flyway:
    enabled: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    root: WARN
    "[com.payment]": DEBUG
