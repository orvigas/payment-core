services:
  postgres:
    image: postgres:15-alpine
    container_name: payment-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payment_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: payment-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - payment-network
    healthcheck:
      test: echo srvr | nc zookeeper 2181
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: payment-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - payment-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server kafka:9092
      interval: 10s
      timeout: 10s
      retries: 5

  # NEW: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: payment-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./k6-prometheus.yml:/etc/prometheus/k6-prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - payment-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # NEW: Jaeger
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: payment-jaeger
    environment:
      # Without this, the all-in-one image never opens its Zipkin-compatible
      # HTTP collector, even though port 9411 is published below.
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
      # Service Performance Monitor (the Jaeger UI's Monitor tab): reads RED
      # metrics derived from spans by otel-collector's spanmetrics connector,
      # not from Jaeger's own trace storage. The normalize flags account for
      # the _total/_bucket suffixes the collector's prometheus exporter adds.
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: http://prometheus:9090
      PROMETHEUS_QUERY_NORMALIZE_CALLS: "true"
      PROMETHEUS_QUERY_NORMALIZE_DURATION: "true"
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686" # Jaeger UI
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"
    networks:
      - payment-network
    healthcheck:
      # The Jaeger image ships wget but not curl.
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:14269" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Sits between the app and Jaeger: forwards spans unchanged (same Zipkin
  # protocol/endpoint the app already used) while also deriving Service
  # Performance Monitor metrics from them via the spanmetrics connector.
  #
  # No healthcheck: the contrib image ships only the otelcol-contrib binary,
  # with no shell and no wget/curl, so there is nothing a container-exec
  # HEALTHCHECK could run. Dependents use `service_started` instead - the
  # collector reaches its "Everything is ready" state within about a second
  # of starting, well before anything downstream needs it.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: payment-otel-collector
    volumes:
      - ./otel-collector/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "8889:8889" # spanmetrics connector's Prometheus exporter (scraped below)
    depends_on:
      jaeger:
        condition: service_healthy
    networks:
      - payment-network

  # Dashboards and datasources are auto-provisioned from ./grafana on startup -
  # nothing to import by hand after `docker-compose up`.
  grafana:
    image: grafana/grafana:latest
    container_name: payment-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - payment-network
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-core-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-payment_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Hardcoded rather than sourced from .env: this hostname only resolves inside the
      # Docker network. springboot3-dotenv loads .env into every Spring Boot process,
      # including `mvn test` on the host, so putting it in .env breaks tests instead.
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      DB_RESET_ON_STARTUP: ${DB_RESET_ON_STARTUP:-true}
      # Hardcoded for the same reason as SPRING_KAFKA_BOOTSTRAP_SERVERS above. This is
      # also the property Micrometer Tracing's Zipkin reporter actually binds to;
      # SPRING_ZIPKIN_BASE_URL (the old Sleuth-era name) has no effect on this stack.
      # Points at otel-collector rather than jaeger directly so spans also get
      # aggregated into Service Performance Monitor metrics; otel-collector
      # forwards the same spans on to Jaeger unchanged.
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://otel-collector:9411/api/v2/spans
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: ${MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED:-true}
    ports:
      - "8080:8080"
      - "5005:5005" # Debug port
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - payment-network
    healthcheck:
      # The alpine runtime image ships wget but not curl.
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Seeds the load-test accounts (loadtest/payment-load-test.js and the wave-test
  # scenario's 100 accounts) after every startup. app.database.reset-on-startup wipes
  # the users table via Flyway on each app boot, so this has to rerun every time
  # rather than only on first `docker compose up`. Waits on payment-core's
  # healthcheck, not postgres's, because that's what guarantees Flyway has already
  # created the users/user_roles tables.
  db-seed:
    image: postgres:15-alpine
    container_name: payment-db-seed
    depends_on:
      payment-core:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./loadtest/seed-load-test-user.sql:/seed-load-test-user.sql:ro
      - ./loadtest/seed-wave-test-users.sql:/seed-wave-test-users.sql:ro
    entrypoint: [ "sh", "-c", "psql -h postgres -U postgres -d payment_db -f /seed-load-test-user.sql && psql -h postgres -U postgres -d payment_db -f /seed-wave-test-users.sql" ]
    networks:
      - payment-network

networks:
  payment-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
